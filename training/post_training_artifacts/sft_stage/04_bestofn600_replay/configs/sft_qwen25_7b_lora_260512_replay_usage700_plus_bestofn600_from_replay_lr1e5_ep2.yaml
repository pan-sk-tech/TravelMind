model: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true
model_class: llm
template: qwen3_nothink

# Replay-style policy improvement: continue from the current best usage700
# adapter and mix old replay data with anti-leak Best-of-N winners.
peft_config:
  name: lora
  adapter_name_or_path: training/outputs/qwen25_7b/sft_260511_main_clean_plus_realbudget_usage700_from_lr6e5_r32_b32_lr2e5_ctx24576_20260511
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: all

kernel_config:
  name: auto
  include_kernels: auto

quant_config: null

dist_config:
  name: fsdp2
  dcp_path: null
  cp_mode: ulysses
  cp_size: 2

train_dataset: training/data/llamafactory/generated/trip_planner_260512_replay_usage700_plus_bestofn600_x1p5_train.yaml
eval_dataset: training/data/llamafactory/generated/trip_planner_260512_replay_usage700_plus_bestofn600_x1p5_val.yaml

output_dir: training/outputs/qwen25_7b/sft_260512_replay_usage700_plus_bestofn600_from_replay_r32_b32_lr1e5_ctx24576_ep2_20260512
micro_batch_size: 1
global_batch_size: 32
cutoff_len: 24576
learning_rate: 1.0e-5
bf16: true
num_train_epochs: 2
logging_steps: 1
batching_workers: 4

# About half an epoch per save/eval. With 3119 examples and global batch 32,
# this is expected to land around steps 49/98/147/196.
save_epochs: 0.5
save_ckpt_as_hf: true
save_total_limit: 8
eval_epochs: 0.5
eval_global_batch_size: 2
eval_batching_workers: 2
enable_activation_checkpointing: true

sample_backend: hf
max_new_tokens: 128
