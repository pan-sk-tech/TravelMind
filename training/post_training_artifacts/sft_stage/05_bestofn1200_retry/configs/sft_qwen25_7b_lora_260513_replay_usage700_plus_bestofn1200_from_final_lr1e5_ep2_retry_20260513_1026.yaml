model: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true
model_class: llm
template: qwen3_nothink

# Retry after the first 260513 run OOMed before any checkpoint was saved.
peft_config:
  name: lora
  adapter_name_or_path: training/outputs/qwen25_7b/sft_260512_replay_usage700_plus_bestofn600_from_replay_r32_b32_lr1e5_ctx24576_ep2_20260512
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: all

kernel_config:
  name: auto
  include_kernels: auto

quant_config: null

dist_config:
  name: fsdp2
  dcp_path: null
  cp_mode: ulysses
  cp_size: 2

train_dataset: training/data/llamafactory/generated/trip_planner_260513_replay_usage700_plus_bestofn1200_train.yaml
eval_dataset: training/data/llamafactory/generated/trip_planner_260513_replay_usage700_plus_bestofn1200_val.yaml

output_dir: training/outputs/qwen25_7b/sft_260513_replay_usage700_plus_bestofn1200_from_final_r32_b32_lr1e5_ctx24576_ep2_retry_20260513_1026
micro_batch_size: 1
global_batch_size: 32
cutoff_len: 24576
learning_rate: 1.0e-5
bf16: true
num_train_epochs: 2
logging_steps: 1
batching_workers: 4

save_epochs: 0.5
